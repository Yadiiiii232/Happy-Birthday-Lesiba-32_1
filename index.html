<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday Lesiba</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #000;
      overflow: hidden;
      font-family: 'Press Start 2P', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .message {
      position: absolute;
      color: #0ff;
      font-size: 2rem;
      text-align: center;
      z-index: 10;
      text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
      animation: pulse 1.5s infinite alternate;
    }

    @keyframes pulse {
      0% { text-shadow: 0 0 10px #0ff, 0 0 20px #0ff; color: #0ff; }
      50% { text-shadow: 0 0 20px #ff0, 0 0 40px #ff0; color: #ff0; }
      100% { text-shadow: 0 0 10px #f0f, 0 0 30px #f0f; color: #f0f; }
    }

    /* Floating image effect */
    .figure {
      position: absolute;
      bottom: -50px;
      width: 150px;
      height: auto;
      background-size: contain;
      background-repeat: no-repeat;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) translateX(0); opacity: 0; }
      10% { opacity: 1; }
      100% { transform: translateY(-120vh) translateX(50px); opacity: 0; }
    }

    .pdf-button {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #0ff;
      color: #000;
      padding: 10px 15px;
      font-family: 'Press Start 2P', monospace;
      text-decoration: none;
      border-radius: 3px;
      z-index: 20;
      box-shadow: 0 0 10px #0ff;
    }
    .pdf-button:hover { background: #ff0; box-shadow: 0 0 15px #ff0; }
  </style>
</head>
<body>

  <div class="message">🎮 Happy Birthday Lesiba 🎉</div>
  <a href="my-gift.pdf" target="_blank" class="pdf-button">Open Gift</a>

  <script>
    const numberOfFigures = 15; // number of floating images
    const figureImage = '/mnt/data/a_2d_digital_illustration_web_page_dedicated_to_wi.png'; // replace with your GitHub path if uploaded

    for (let i = 0; i < numberOfFigures; i++) {
      const f = document.createElement("div");
      f.className = "figure";
      f.style.backgroundImage = `url(${figureImage})`;
      f.style.left = Math.random() * 80 + "vw"; // random horizontal position
      f.style.animationDuration = (8 + Math.random() * 5) + "s"; // random speed
      f.style.animationDelay = Math.random() * 5 + "s"; // stagger start
      document.body.appendChild(f);
    }
  </script>

</body>
</html>
